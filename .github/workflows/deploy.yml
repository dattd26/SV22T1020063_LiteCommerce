name: CI/CD LiteCommerce

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://sv22t1020063-litecommerce.onrender.com

    steps:
      - name: Deploy to Render (Admin & Shop)
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_SHOP }}

      - name: Show Production URL
        run: echo "Production: https://sv22t1020063-litecommerce.onrender.com"