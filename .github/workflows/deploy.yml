name: CI/CD LiteCommerce Docker

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build và Push Admin Image
      - name: Build and Push Admin
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.admin
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/litecommerce-admin:latest

      # Build và Push Shop Image
      - name: Build and Push Shop
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.shop
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/litecommerce-shop:latest

  deploy-admin:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy Admin to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'sv22t1020063-litecommerce-admin'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_ADMIN }}
          images: '${{ secrets.DOCKER_USERNAME }}/litecommerce-admin:latest'

  deploy-shop:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy Shop to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'sv22t1020063-litecommerce-shop'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_SHOP }}
          images: '${{ secrets.DOCKER_USERNAME }}/litecommerce-shop:latest'