services:
  admin-app:
    build:
      context: .
      dockerfile: Dockerfile.admin
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION=${DB_CONNECTION}

  shop-app:
    build:
      context: .
      dockerfile: Dockerfile.shop
    ports:
      - "8082:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DB_CONNECTION=${DB_CONNECTION}
